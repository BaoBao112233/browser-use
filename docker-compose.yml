services:
  browser-use:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    env_file:
      - .env
    volumes:
      - ./data:/data
      - ./api_server.py:/app/api_server.py
      - ./storage_state.json:/app/storage_state.json
      - ./service-account.json:/app/service-account.json
    user: root
    entrypoint: ["python", "api_server.py"]
